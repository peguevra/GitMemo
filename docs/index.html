<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitMemo</title>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
}

h1 {
    font-size: 20px;
}

#formBox {
    position: sticky;
    top: 0;
    background: white;
    padding: 8px;
    border-bottom: 1px solid #ccc;
    z-index: 10;
}

input {
    width: 100%;
    font-size: 14px;
    margin-bottom: 5px;
    padding: 6px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    margin-bottom: 5px;
}

.item {
    display: flex;
    align-items: flex-start;
    border-bottom: 1px solid #ddd;
    padding: 6px 0;
}

.check {
    margin-right: 6px;
}

.time {
    font-size: 12px;
    color: gray;
}

.title {
    font-size: 14px;
    word-break: break-word;
}
</style>
</head>

<body>

<h1>GitMemo</h1>

<div id="formBox">
    <input id="date" placeholder="2026-06-02">
    <input id="time" placeholder="11:00">
    <input id="title" placeholder="内容">
    <button onclick="add()">追加</button>

    <!-- ★ ボタン1つに統合 -->
    <button id="deleteBtn" onclick="handleDeleteButton()">削除モード</button>
</div>

<div id="list"></div>

<script>

const API_URL = "https://gitmemo-api.donation9196999.workers.dev";

let deleteMode = false;

// =====================
// 一覧ロード
// =====================
async function load() {

    const res = await fetch('./data/events.json?nocache=' + Date.now());
    const json = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = "";

    json.events
        .sort((a,b) => new Date(b.StartDateTime) - new Date(a.StartDateTime))
        .forEach(e => {

        const div = document.createElement('div');
        div.className = 'item';

        let checkbox = "";

        if (deleteMode) {
            checkbox = `<input type="checkbox" class="check" value="${e.Id}">`;
        }

        div.innerHTML = `
            ${checkbox}
            <div>
                <div class="time">${e.StartDateTime.replace('T',' ')}</div>
                <div class="title">${e.Title}</div>
            </div>
        `;

        list.appendChild(div);
    });
}

// =====================
// 削除ボタン制御
// =====================
function handleDeleteButton() {

    if (!deleteMode) {
        // モードON
        deleteMode = true;
        document.getElementById('deleteBtn').innerText = "削除実行";
        load();
    } else {
        // 実行
        deleteSelected();
    }
}

// =====================
// 追加
// =====================
async function add() {

    const d = document.getElementById('date').value;
    const t = document.getElementById('time').value;
    const title = document.getElementById('title').value;

    if (!d || !t || !title) {
        alert("全部入力");
        return;
    }

    const dt = `${d}T${t}:00`;

    const obj = {
        Id: Date.now().toString(),
        StartDateTime: dt,
        EndDateTime: null,
        Title: title,
        Raw: "from iPhone"
    };

    const res = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(obj)
    });

    const text = await res.text();

    alert(text);

    if (text.startsWith("OK")) {
        load();
    }
}

// =====================
// 選択削除
// =====================
async function deleteSelected() {

    const checks = document.querySelectorAll('.check:checked');

    if (checks.length === 0) {
        alert("選択なし");
        return;
    }

    // ★ 確認ダイアログ
    if (!confirm(`${checks.length}件削除しますか？`)) {
        return;
    }

    for (let c of checks) {
        await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ deleteId: c.value })
        });
    }

    alert("削除完了");

    // モード解除
    deleteMode = false;
    document.getElementById('deleteBtn').innerText = "削除モード";

    load();
}

load();

</script>

</body>
</html>
