<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitMemo</title>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
}

h1 {
    font-size: 20px;
}

/* フォーム固定 */
#formBox {
    position: sticky;
    top: 0;
    background: white;
    padding: 8px;
    border-bottom: 1px solid #ccc;
}

input {
    width: 100%;
    font-size: 14px;
    margin-bottom: 5px;
    padding: 5px;
}

button {
    width: 100%;
    padding: 6px;
    font-size: 14px;
}

.item {
    border-bottom: 1px solid #ddd;
    padding: 6px 0;
}

.time {
    font-size: 12px;
    color: gray;
}

.title {
    font-size: 14px;
    word-break: break-word;
}
</style>

</head>

<body>

<h1>GitMemo</h1>

<div id="formBox">
    <input id="date" placeholder="2026-06-02">
    <input id="time" placeholder="11:00">
    <input id="title" placeholder="内容">
    <button onclick="add()">追加</button>
</div>

<div id="list"></div>

<script>

const API_URL = "https://gitmemo-api.donation9196999.workers.dev/"; // ←ここにWorker URL

async function load() {
    const res = await fetch('./data/events.json');
    const json = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = "";

    json.events
        .sort((a,b) => new Date(b.StartDateTime) - new Date(a.StartDateTime))
        .forEach(e => {

        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
            <div class="time">${e.StartDateTime.replace('T',' ')}</div>
            <div class="title">${e.Title}</div>
            <button onclick="del('${e.Id}')">削除</button>
        `;

        list.appendChild(div);
    });
}

async function add() {

    const d = document.getElementById('date').value;
    const t = document.getElementById('time').value;
    const title = document.getElementById('title').value;

    if (!d || !t || !title) {
        alert("全部入力");
        return;
    }

    const dt = `${d}T${t}:00`;

    const obj = {
        Id: Date.now().toString(),
        StartDateTime: dt,
        EndDateTime: null,
        Title: title,
        Raw: "from iPhone"
    };

    await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(obj)
    });

    alert("追加した（数秒後反映）");

    load();
}

async function del(id) {

    await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ deleteId: id })
    });

    alert("削除した（数秒後反映）");

    load();
}

load();

</script>

</body>
</html>
