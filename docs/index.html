<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GitMemo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>GitMemo</h1>

<div id="formBox">
    <input id="date" placeholder="2026-06-02">
    <input id="time" placeholder="11:00">
    <input id="title" placeholder="内容">

    <div class="btn-row">
        <button onclick="add()">追加</button>
        <button id="deleteBtn" class="btn-delete" onclick="handleDeleteButton()">削除</button>
    </div>
</div>

<div id="list"></div>

<script>

const API_URL = "https://gitmemo-api.donation9196999.workers.dev";

let deleteMode = false;
let selectedIds = new Set();

// =====================
// 一覧
// =====================
async function load() {

    selectedIds.clear();

    const res = await fetch('./data/events.json?nocache=' + Date.now());
    const json = await res.json();

    const list = document.getElementById('list');
    list.innerHTML = "";

    json.events
        .sort((a,b) => new Date(b.StartDateTime) - new Date(a.StartDateTime))
        .forEach(e => {

        const div = document.createElement('div');
        div.className = 'item';

        let checkbox = '';

        if (deleteMode) {
            checkbox = `<input type="checkbox" class="check" onchange="toggleSelect('${e.Id}', this)">`;
        }

        div.innerHTML = `
            ${checkbox}
            <div class="content">
                <div class="time">${e.StartDateTime.replace('T',' ')}</div>
                <div class="title">${e.Title}</div>
            </div>
        `;

        list.appendChild(div);
    });

    updateDeleteButton();
}

// =====================
// 選択
// =====================
function toggleSelect(id, el) {

    if (el.checked) {
        selectedIds.add(id);
        el.closest('.item').classList.add('selected');
    } else {
        selectedIds.delete(id);
        el.closest('.item').classList.remove('selected');
    }

    updateDeleteButton();
}

// =====================
// ボタン状態更新
// =====================
function updateDeleteButton() {

    const btn = document.getElementById('deleteBtn');

    if (!deleteMode) {
        btn.innerText = "削除";
        btn.classList.remove("active");
        btn.disabled = false;
        return;
    }

    const count = selectedIds.size;

    btn.innerText = count > 0
        ? `削除実行（${count}）`
        : "削除実行";

    btn.disabled = count === 0;
}

// =====================
// 削除ボタン
// =====================
function handleDeleteButton() {

    if (!deleteMode) {
        deleteMode = true;

        const btn = document.getElementById('deleteBtn');
        btn.classList.add("active");

        load();
    } else {
        deleteSelected();
    }
}

// =====================
// 削除実行
// =====================
async function deleteSelected() {

    if (selectedIds.size === 0) {
        exitDeleteMode();
        return;
    }

    if (!confirm("削除してよろしいですか？")) {
        exitDeleteMode();
        return;
    }

    for (const id of selectedIds) {
        await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ deleteId: id })
        });
    }

    exitDeleteMode();
}

// =====================
// モード終了
// =====================
function exitDeleteMode() {
    deleteMode = false;
    selectedIds.clear();

    const btn = document.getElementById('deleteBtn');
    btn.classList.remove("active");
    btn.disabled = false;
    btn.innerText = "削除";

    load();
}

// =====================
// 追加
// =====================
async function add() {

    const d = document.getElementById('date').value;
    const t = document.getElementById('time').value;
    const title = document.getElementById('title').value;

    if (!d || !t || !title) {
        alert("全部入力");
        return;
    }

    const dt = `${d}T${t}:00`;

    const obj = {
        Id: Date.now().toString(),
        StartDateTime: dt,
        EndDateTime: null,
        Title: title,
        Raw: "from iPhone"
    };

    const res = await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(obj)
    });

    const text = await res.text();

    alert("API応答: " + text);

    if (text.startsWith("OK")) {
        load();
    }
}

load();

</script>

</body>
</html>
