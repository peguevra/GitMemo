<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitMemo</title>

<style>
body {
    font-family: sans-serif;
    margin: 10px;
}

h1 {
    font-size: 20px;
}

/* フォーム固定 */
#formBox {
    position: sticky;
    top: 0;
    background: white;
    padding: 8px;
    border-bottom: 1px solid #ccc;
    z-index: 10;
}

input {
    width: 100%;
    font-size: 14px;
    margin-bottom: 5px;
    padding: 6px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 6px;
    font-size: 14px;
    margin-bottom: 5px;
}

.item {
    border-bottom: 1px solid #ddd;
    padding: 6px 0;
}

.time {
    font-size: 12px;
    color: gray;
}

.title {
    font-size: 14px;
    word-break: break-word;
}

.delbtn {
    font-size: 12px;
    margin-top: 4px;
}
</style>

</head>

<body>

<h1>GitMemo</h1>

<div id="formBox">
    <input id="date" placeholder="2026-06-02">
    <input id="time" placeholder="11:00">
    <input id="title" placeholder="内容">
    <button onclick="add()">追加</button>
</div>

<div id="list"></div>

<script>

const API_URL = "https://gitmemo-api.donation9196999.workers.dev"; // ★必ず自分のURLに変更

// =====================
// 一覧ロード
// =====================
async function load() {

    try {
        const res = await fetch('./data/events.json?nocache=' + Date.now());
        const json = await res.json();

        const list = document.getElementById('list');
        list.innerHTML = "";

        json.events
            .sort((a,b) => new Date(b.StartDateTime) - new Date(a.StartDateTime))
            .forEach(e => {

            const div = document.createElement('div');
            div.className = 'item';

            div.innerHTML = `
                <div class="time">${e.StartDateTime.replace('T',' ')}</div>
                <div class="title">${e.Title}</div>
                <button class="delbtn" onclick="del('${e.Id}')">削除</button>
            `;

            list.appendChild(div);
        });

    } catch(e) {
        alert("JSON取得失敗: " + e);
    }
}

// =====================
// 追加（デバッグ付き）
// =====================
async function add() {

    const d = document.getElementById('date').value;
    const t = document.getElementById('time').value;
    const title = document.getElementById('title').value;

    if (!d || !t || !title) {
        alert("全部入力");
        return;
    }

    const dt = `${d}T${t}:00`;

    const obj = {
        Id: Date.now().toString(),
        StartDateTime: dt,
        EndDateTime: null,
        Title: title,
        Raw: "from iPhone"
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(obj)
        });

        const text = await res.text();

        alert("API応答: " + text);

        // 成功時のみ再読込
        if (text.startsWith("OK")) {
            load();
        }

    } catch(e) {
        alert("通信失敗: " + e);
    }
}

// =====================
// 削除
// =====================
async function del(id) {

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ deleteId: id })
        });

        const text = await res.text();

        alert("削除応答: " + text);

        if (text.startsWith("OK")) {
            load();
        }

    } catch(e) {
        alert("削除失敗: " + e);
    }
}

load();

</script>

</body>
</html>
