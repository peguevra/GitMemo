<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitMemo</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-size: 14px;
    margin: 0;
}

/* フォーム固定 */
#formArea {
    position: sticky;
    top: 0;
    background: #fff;
    padding: 8px;
    border-bottom: 1px solid #ccc;
    z-index: 1000;
}

/* 横並び */
.row {
    display: flex;
    gap: 4px;
}

.row input {
    flex: 1;
    padding: 4px;
    font-size: 14px;
}

.row button {
    padding: 4px 6px;
    font-size: 12px;
}

/* 出力 */
#output {
    font-size: 12px;
    white-space: pre-wrap;
}

/* 一覧 */
.item {
    padding: 8px;
    border-bottom: 1px solid #eee;
}

/* 削除ボタン */
.del {
    font-size: 11px;
    color: red;
    margin-left: 8px;
}
</style>

</head>

<body>

<h3 style="margin:8px;">GitMemo</h3>

<!-- フォーム -->
<div id="formArea">

<div class="row">
    <input id="date" type="datetime-local">
    <input id="title" type="text" placeholder="内容">
</div>

<div class="row">
    <button onclick="generate()">生成</button>
    <button onclick="copyJson()">コピー</button>
</div>

<pre id="output"></pre>

</div>

<!-- 一覧 -->
<div id="list"></div>

<script>

// 日付整形
function formatDate(dt) {
    const d = new Date(dt);
    return d.getFullYear() + "/" +
        String(d.getMonth()+1).padStart(2,'0') + "/" +
        String(d.getDate()).padStart(2,'0') + " " +
        String(d.getHours()).padStart(2,'0') + ":" +
        String(d.getMinutes()).padStart(2,'0');
}

// 表示
async function load() {
    const res = await fetch('./data/events.json');
    const json = await res.json();

    const list = document.getElementById('list');

    json.events.sort((a, b) =>
        new Date(b.StartDateTime) - new Date(a.StartDateTime)
    );

    json.events.forEach(e => {
        const div = document.createElement('div');
        div.className = 'item';

        div.innerHTML = `
            <div>
                ${formatDate(e.StartDateTime)}
                <span class="del" onclick='deleteItem(${JSON.stringify(e)})'>削除</span>
            </div>
            <div>${e.Title}</div>
        `;

        list.appendChild(div);
    });
}

// 追加生成
function generate() {
    const dt = document.getElementById('date').value;
    const title = document.getElementById('title').value;

    if (!dt || !title) {
        alert("入力してください");
        return;
    }

    const d = new Date(dt);

    const id = d.getFullYear().toString() +
        String(d.getMonth()+1).padStart(2,'0') +
        String(d.getDate()).padStart(2,'0') + "_" +
        String(d.getHours()).padStart(2,'0') +
        String(d.getMinutes()).padStart(2,'0');

    const obj = {
        Id: id,
        StartDateTime: d.toISOString().slice(0,19),
        EndDateTime: null,
        Title: title,
        Raw: "manual"
    };

    document.getElementById('output').textContent =
        JSON.stringify(obj, null, 2);
}

// 削除JSON生成
function deleteItem(e) {
    const obj = {
        deleteId: e.Id
    };

    document.getElementById('output').textContent =
        JSON.stringify(obj, null, 2);
}

// コピー
function copyJson() {
    const text = document.getElementById('output').textContent;

    if (!text) {
        alert("先に生成");
        return;
    }

    navigator.clipboard.writeText(text)
        .then(() => alert("コピー"))
        .catch(() => alert("失敗"));
}

load();

</script>

</body>
</html>
